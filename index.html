<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Anika ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff758c,#ff7eb3);
display:flex;
justify-content:center;

height:100vh;
overflow:hidden;
}

.container{
text-align:center;

}

h1{
font-size:42px;

}

p{
font-size:22px;
margin-bottom:30px;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:40px;
cursor:pointer;
margin:10px;
transition:.3s;
}

#yes{
background:#28a745;
color:white;
}

#yes:hover{
transform:scale(1.1);
}

#no{
background:#ff3333;
color:white;
position:absolute;
}

.heart{
position:absolute;
color:white;
font-size:20px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}
</style>

<body>

<div class="container">
<h1>Dear Anika ❤️</h1>

<p>
Kaafi time se ek baat dil me thi... 🥹<br><br>

Jab bhi tumse baat hoti hai mera din special ban jaata hai. 💖<br>
Tum sirf khoobsurat hi nahi, balki bahut achhi insaan bhi ho. 🌹<br><br>

Main tumhe genuinely pasand karta hu... ❤️<br><br>

<b>Will You Be My Girlfriend? 💍🥺</b>
</p>

<button id="yes" onclick="yesClick()">YES 💖</button>
<button id="no" onmouseover="moveNo()">NO 🤒</button>

</div>

<script>

function yesClick(){
document.body.innerHTML=`
<div style="display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;background:#ff4d6d;color:white;">
<div>
<h1 style="font-size:55px;">Yay Anika ❤️🥹</h1>
<h2>You just made me the happiest person alive! 💖🌹</h2>
<h2>I Promise I'll Always Respect, Care & Stand By You. ❤️</h2>
</div>
</div>`;
}

function moveNo(){
let btn=document.getElementById("no");

let x=Math.random()*(window.innerWidth-120);
let y=Math.random()*(window.innerHeight-80);

btn.style.left=x+"px";
btn.style.top=y+"px";
}

function hearts(){
let heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(hearts,300);

</script>
