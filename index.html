<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>One Last Chance ❤️</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}
.box{
    text-align:center;
}
h1{
    font-size:35px;
}
button{
    padding:15px 35px;
    font-size:20px;
    margin:20px;
    border:none;
    border-radius:30px;
    cursor:pointer;
}
#yes{
    background:#ff2d55;
    color:white;
}
#no{
    background:#444;
    color:white;
    position:absolute;
}
</style>
</head>

<body>

<div class="box">
<h1>🥺 Will you unblock me and give me one more chance?</h1>

<button id="yes" onclick="love()">Yes ❤️</button>
<button id="no">No 💔</button>
</div>

<script>
const no=document.getElementById("no");

no.addEventListener("mouseover",move);
no.addEventListener("click",move);

function move(){
    no.style.left=Math.random()*(window.innerWidth-120)+"px";
    no.style.top=Math.random()*(window.innerHeight-60)+"px";
}

function love(){
    document.body.innerHTML=`
    <div style="text-align:center;color:white;">
        <h1>❤️ Thank You ❤️</h1>
        <h2>I promise I'll never give you a reason to block me again. 🌹</h2>
    </div>`;
}
<Dear Jerry ❤️,

Shayad tumne mujhe block kar diya,
lekin meri feelings block nahi hui.

Main bas itna chahti hoon ki
ek baar bina gusse ke meri baat sun lo.

Main perfect nahi hoon,
par jo bhi feel karti hoon,
woh dil se karti hoon.

Agar tum ek aur chance doge,
toh main uski value hamesha karungi.

No pressure...
Bas ek smile ke saath "Yes" keh dena. ❤️

– From Someone Who Still Cares 🌹>

</body>
</html>
